name: CI/CD Deploy to AWS EC2

# main 브랜치에 push 될 때마다 실행됩니다.
on:
  push:
    branches:
      - main  # 만약 브랜치 이름이 master라면 master로 수정하세요.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 내 코드 가져오기 (Checkout)
        uses: actions/checkout@v3

      - name: 2. 자바(JDK 21) 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 4. 프로젝트 빌드 (.jar 파일 생성)
        run: ./gradlew clean build -x test  # 테스트 코드는 건너뛰고 빠르게 빌드

      - name: 5. 빌드된 파일 전송 및 배포 스크립트 실행 (Native SSH)
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        run: |
          # 1. 깃헙 서버에 임시로 열쇠(Secret) 깎기
          mkdir -p ~/.ssh
          echo "$KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. EC2 서버 지문을 등록해서 튕기지 않게 만들기
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          
          # 3. SCP로 파일 전송 
          echo ">> EC2로 파일 전송 시작 <<"
          scp ./build/libs/Kumo-0.0.1-SNAPSHOT.jar $USER@$HOST:/home/ubuntu/kumo/
          
          # 4. SSH로 접속해서 배포 스크립트(deploy.sh) 실행
          echo ">> 배포 스크립트 실행 시작 <<"
          ssh $USER@$HOST "cd /home/ubuntu/kumo && ./deploy.sh"