<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
  <head>
    <meta charset="UTF-8" />
    <title th:text="#{talent.detail.pageTitle}">KUMO RECRUITER - 인재 상세 정보</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/recruiter/recruiterHeader.css}" />
    <link rel="stylesheet" th:href="@{/css/NonLoginFragments/NonLoginFooter.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/main.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/dark-theme.css}" />
    <style>
        body { background-color: #f8faff; transition: background-color 0.3s, color 0.3s; }
        .main-container { display: flex; flex-direction: column; min-height: 100vh; }
        .content-body { flex: 1; padding: 40px; }
        .resume-view-container {
            background: white; border-radius: 30px; padding: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            width: 100%; max-width: 900px; margin: 0 auto 40px auto;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .view-section { margin-bottom: 45px; }
        .section-title {
            font-size: 1.3rem; font-weight: 800; color: #1a1f27;
            margin-bottom: 25px; padding-bottom: 12px; border-bottom: 2px solid #f2f4f6;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title i { color: #7db4e6; font-size: 1.1rem; }
        .info-grid { display: grid; grid-template-columns: 140px 1fr; gap: 15px; margin-bottom: 12px; align-items: baseline; }
        .info-label { font-weight: 700; color: #8b95a1; font-size: 0.95rem; }
        .info-value { color: #333d4b; font-weight: 500; }
        .contact-box {
            background: #f8faff; padding: 25px; border-radius: 20px;
            border: 1px solid #e8f3ff; margin-top: 25px;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .masked-text { color: #b0b8c1; font-style: italic; font-size: 0.9rem; }
        .career-item { padding: 20px; border-radius: 15px; background: #fcfdfe; border: 1px solid #f2f4f6; margin-bottom: 15px; }
        .t-badge { display: inline-block; font-size: 0.75rem; padding: 4px 10px; border-radius: 8px; font-weight: 700; margin-left: 8px; }
        .badge-blue { background: #e8f3ff; color: #7db4e6; }
        .footer-action-bar {
            position: sticky; bottom: 30px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px); padding: 15px 40px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; justify-content: center; gap: 20px;
            border: 1px solid rgba(255,255,255,0.3); z-index: 100; max-width: 500px; margin: 0 auto;
        }
        .btn-offer-large {
            background: #7db4e6; color: white; border: none; padding: 14px 60px;
            border-radius: 18px; font-weight: 800; font-size: 1.1rem; transition: all 0.3s;
        }
        .btn-offer-large:hover { background: #69a3d9; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(125, 180, 230, 0.4); }
        .btn-back-circle {
            width: 54px; height: 54px; border-radius: 18px; border: 1px solid #e5e8eb;
            background: white; color: #4e5968; display: flex; align-items: center; justify-content: center;
        }
        body.dark-mode { background-color: #121212 !important; color: #e5e8eb; }
        body.dark-mode .resume-view-container { background-color: #1e1e1e !important; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
        body.dark-mode .section-title { color: #ffffff !important; border-bottom-color: #2d2d2d; }
        body.dark-mode .info-value { color: #e5e8eb !important; }
        body.dark-mode .info-label { color: #8b95a1 !important; }
        body.dark-mode .contact-box { background-color: #252525 !important; border-color: #333 !important; }
        body.dark-mode .career-item, body.dark-mode .cert-item { 
            background-color: #252525 !important; 
            border-color: #333 !important; 
            color: #e5e8eb !important;
        }
        body.dark-mode .career-item .text-muted { color: #8b95a1 !important; }
        body.dark-mode .footer-action-bar { background-color: rgba(30, 30, 30, 0.8) !important; border-color: rgba(255, 255, 255, 0.1) !important; }
        body.dark-mode .btn-back-circle { background-color: #2d2d2d !important; border-color: #444 !important; color: #aaa !important; }
        body.dark-mode .self-intro-box { background-color: #252525 !important; border-color: #333 !important; }
    </style>
  </head>
  <body>
    <header th:replace="~{recruiterView/fragments/recruiterHeader :: headerFragment}"></header>

    <div class="dashboard-wrapper">
      <div th:replace="~{recruiterView/fragments/sidebar :: sidebarFragment}"></div>

      <div class="main-container">
        <main class="content-body">
            <!-- 🌟 서버에서 보낸 처리 결과(성공/실패) 알림 -->
            <script th:inline="javascript">
                const successMsg = [[${successMsg}]];
                const errorMsg = [[${errorMsg}]];
                if (successMsg) alert(successMsg);
                if (errorMsg) alert(errorMsg);
            </script>

            <div class="resume-view-container">
                <!-- 1. 헤더: 이름 및 기본 정보 -->
                <section class="view-section">
                    <div class="d-flex align-items-center gap-4 mb-4">
                        <img th:src="${talent.profileImage?.fileUrl ?: '/images/common/default_profile.png'}" 
                             style="width: 110px; height: 110px; border-radius: 30px; object-fit: cover; border: 4px solid #f8faff;">
                        <div>
                            <div class="d-flex align-items-center mb-1">
                                <h1 class="fw-bold mb-0" style="font-size: 2rem; color: #1a1f27;" th:text="${talent.nameKanjiMei ?: talent.nickname}">이름</h1>
                                <span class="t-badge badge-blue" th:text="${profile.careerType == 'EXPERIENCED' ? #messages.msg('resume.btn.experienced') : #messages.msg('resume.btn.newcomer')}">구분</span>
                            </div>
                            <p class="text-muted fs-5 mb-0" th:text="${resume.desiredJob ?: #messages.msg('talent.detail.job.none')}">희망 직종</p>
                        </div>
                    </div>

                    <div class="contact-box">
                        <div class="info-grid">
                            <span class="info-label"><i class="fa-solid fa-phone me-2"></i><span th:text="#{resume.label.phone}">연락처</span></span>
                            <span class="info-value" th:if="${profile?.contactPublic}" th:text="${talent?.contact}">010-0000-0000</span>
                            <span class="info-value masked-text" th:unless="${profile?.contactPublic}" th:text="#{talent.detail.contact.masked}">비공개 설정된 정보입니다.</span>
                        </div>
                        <div class="info-grid">
                            <span class="info-label"><i class="fa-solid fa-envelope me-2"></i><span th:text="#{join.label.email}">이메일</span></span>
                            <span class="info-value" th:if="${profile?.contactPublic}" th:text="${talent?.email}">test@example.com</span>
                            <span class="info-value masked-text" th:unless="${profile?.contactPublic}" th:text="#{talent.detail.contact.masked}">비공개 설정된 정보입니다.</span>
                        </div>
                        <div class="info-grid">
                            <span class="info-label"><i class="fa-solid fa-location-dot me-2"></i><span th:text="#{resume.label.address}">주소</span></span>
                            <span class="info-value" th:if="${profile?.contactPublic}" th:text="${(talent?.addressMain ?: '') + ' ' + (talent?.addressDetail ?: '')}">주소</span>
                            <span class="info-value masked-text" th:unless="${profile?.contactPublic}" th:text="#{talent.detail.contact.masked}">비공개 설정된 정보입니다.</span>
                        </div>
                    </div>
                </section>

                <!-- 2. 학력사항 -->
                <section class="view-section" th:if="${resume.schoolName != null}">
                    <h3 class="section-title"><i class="fa-solid fa-graduation-cap"></i><span th:text="#{resume.section.education}">학력사항</span></h3>
                    <div class="info-grid">
                        <span class="info-label" th:text="#{resume.label.schoolName}">학교명</span>
                        <span class="info-value" th:text="${resume.schoolName}">학교명</span>
                    </div>
                    <div class="info-grid">
                        <span class="info-label" th:text="#{talent.detail.edu.status}">학력/상태</span>
                        <span class="info-value">
                            <span th:text="${#messages.msg('edu.level.' + resume.educationLevel)}">학력</span>
                            (<span th:text="${#messages.msg('edu.status.' + resume.educationStatus)}">상태</span>)
                        </span>
                    </div>
                </section>

                <!-- 3. 경력사항 -->
                <section class="view-section" th:if="${resume.companyName != null and !resume.companyName.isEmpty()}">
                    <h3 class="section-title"><i class="fa-solid fa-briefcase"></i><span th:text="#{resume.section.career}">경력사항</span></h3>
                    <div class="career-item" th:each="comp, stat : ${resume.companyName}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="fw-bold fs-5" th:text="${comp}">회사명</div>
                            <div class="small text-muted fw-bold">
                                <span th:text="${resume.startYear[stat.index] + '.' + resume.startMonth[stat.index]}"></span> ~ 
                                <span th:text="${resume.endYear[stat.index] + '.' + resume.endMonth[stat.index]}"></span>
                            </div>
                        </div>
                        <div class="info-value" style="white-space: pre-wrap;" th:text="${resume.jobDuties[stat.index]}">담당업무</div>
                    </div>
                </section>

                <!-- 4. 자격증 -->
                <section class="view-section" th:if="${resume.certName != null and !resume.certName.isEmpty()}">
                    <h3 class="section-title"><i class="fa-solid fa-award"></i><span th:text="#{resume.label.certificate}">자격증</span></h3>
                    <div class="info-grid" th:each="cert, stat : ${resume.certName}">
                        <span class="info-label" th:text="${resume.certYear[stat.index]} + #{talent.detail.cert.acquired}">2024년 취득</span>
                        <span class="info-value">
                            <strong th:text="${cert}">자격증명</strong>
                            <span class="text-muted ms-2" th:text="'| ' + ${resume.certPublisher[stat.index]}">발행처</span>
                        </span>
                    </div>
                </section>

                <!-- 5. 어학 능력 -->
                <section class="view-section" th:if="${resume.languageName != null and !resume.languageName.isEmpty()}">
                    <h3 class="section-title"><i class="fa-solid fa-language"></i><span th:text="#{resume.label.language}">어학 능력</span></h3>
                    <div class="info-grid" th:each="lang, stat : ${resume.languageName}">
                        <span class="info-label" th:text="${lang}">언어</span>
                        <span class="info-value">
                            <span class="t-badge badge-blue" style="margin-left:0;" th:text="${#messages.msg('resume.btn.' + resume.languageLevel[stat.index].toLowerCase())}">상급</span>
                        </span>
                    </div>
                </section>

                <!-- 6. 희망 근무조건 -->
                <section class="view-section">
                    <h3 class="section-title"><i class="fa-solid fa-circle-check"></i><span th:text="#{resume.section.desiredConditions}">희망 근무조건</span></h3>
                    <div class="info-grid">
                        <span class="info-label" th:text="#{resume.label.desiredLocation}">희망 지역</span>
                        <span class="info-value">
                            <span th:text="${#messages.msg('loc.' + resume.desiredLocation1)}">지역1</span>
                            <span th:text="${#messages.msg('ward.' + resume.desiredLocation1 + '.' + resume.desiredLocation2)}">지역2</span>
                        </span>
                    </div>
                    <div class="info-grid">
                        <span class="info-label" th:text="#{resume.label.desiredSalary}">희망 급여</span>
                        <span class="info-value">
                            <span th:text="${#messages.msg('salary.type.' + resume.salaryType.toLowerCase())}">시급</span> 
                            <strong th:text="${#numbers.formatInteger(resume.desiredSalary, 0, 'COMMA')}">1,000</strong><span th:text="#{resume.label.yen}">円</span>
                        </span>
                    </div>
                    <div class="info-grid">
                        <span class="info-label" th:text="#{resume.label.desiredJob}">희망 직종</span>
                        <span class="info-value" th:text="${resume.desiredJob ?: #messages.msg('talent.detail.job.none')}">희망 직종</span>
                    </div>
                    <div class="info-grid">
                        <span class="info-label" th:text="#{resume.label.desiredPeriod}">근무 가능 기간</span>
                        <span class="info-value" th:if="${resume.desiredPeriod != null}" th:text="${#messages.msg('period.' + resume.desiredPeriod)}">기간</span>
                    </div>
                </section>

                <!-- 7. 자기소개 -->
                <section class="view-section" th:if="${resume.selfIntroduction != null}">
                    <h3 class="section-title"><i class="fa-solid fa-user-pen"></i><span th:text="#{resume.label.selfIntro}">자기소개</span></h3>
                    <div class="info-value self-intro-box" style="white-space: pre-wrap; line-height: 1.8; background: #fcfdfe; padding: 25px; border-radius: 20px; border: 1px solid #f2f4f6;" 
                         th:text="${resume.selfIntroduction}">자기소개 내용</div>
                </section>

                <!-- 8. 증빙서류 -->
                <section class="view-section" th:if="${resume.portfolioFileUrls != null and !resume.portfolioFileUrls.isEmpty()}">
                    <h3 class="section-title"><i class="fa-solid fa-file-invoice"></i><span th:text="#{resume.label.document}">증빙서류</span></h3>
                    <div class="d-flex flex-wrap gap-3">
                        <div th:each="url : ${resume.portfolioFileUrls}">
                            <img th:src="${url}" style="width: 180px; height: 180px; object-fit: cover; border-radius: 15px; border: 1px solid #eee; cursor: zoom-in;" 
                                 th:onclick="|window.open(this.src)|">
                        </div>
                    </div>
                </section>
            </div>

            <!-- 하단 액션 바 -->
            <div class="footer-action-bar">
                <button class="btn-back-circle" onclick="history.back()" th:title="#{detail.btn.back}">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <!-- 🌟 복잡한 스크립트 없이 a 태그 클릭처럼 /Recruiter/sendOffer 경로로 바로 튕깁니다 -->
                <button class="btn-offer-large" 
                        th:onclick="|if(confirm('#{talent.detail.msg.offer_confirm}')) location.href='/Recruiter/sendOffer?userId=${talent.userId}'|"
                        th:text="#{talent.detail.btn.offer}">스카우트 제안하기</button>
            </div>
        </main>

        <footer th:replace="~{NonLoginFragments/NonLoginFooter :: footerFragment}"></footer>
      </div>
    </div>
    
    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <script th:src="@{/js/recruiter/recruiterHeader.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
