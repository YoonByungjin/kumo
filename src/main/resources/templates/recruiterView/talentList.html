<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <title th:text="#{talent.detail.pageTitle}">KUMO RECRUITER - 인재 찾기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/recruiter/recruiterHeader.css}" />
    <link rel="stylesheet" th:href="@{/css/NonLoginFragments/NonLoginFooter.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/main.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/dark-theme.css}" />
    <style>
        body { background-color: #f8faff; transition: background-color 0.3s; }
        
        .main-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .content-body {
            flex: 1; /* 푸터를 아래로 밀어내기 위해 본문이 남은 공간을 차지하게 함 */
            padding: 40px;
        }

        .talent-list-wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }

        .talent-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f2f4f6;
            cursor: pointer;
        }

        .talent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(125, 180, 230, 0.15);
            border-color: #7db4e6;
        }

        .talent-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .talent-avatar {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid #f8faff;
        }

        .talent-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .talent-name-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .name-text {
            font-size: 1.15rem;
            font-weight: 800;
            color: #1a1f27;
        }

        .career-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
        }
        .badge-exp { background: #e8f3ff; color: #7db4e6; }
        .badge-new { background: #f2f4f6; color: #8b95a1; }

        .pr-text {
            color: #6b7684;
            font-size: 0.95rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-view {
            background-color: #f2f4f6;
            color: #4e5968;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .talent-card:hover .btn-view {
            background-color: #7db4e6;
            color: white;
        }

        /* Dark Mode */
        body.dark-mode { background-color: #121212 !important; }
        body.dark-mode .talent-card { background-color: #1e1e1e !important; border-color: #2d2d2d; }
        body.dark-mode .name-text { color: #ffffff !important; }
        body.dark-mode .pr-text { color: #8b95a1; }
        body.dark-mode .btn-view { background-color: #2d2d2d; color: #aaa; }
        body.dark-mode .talent-card:hover { border-color: #7db4e6; box-shadow: 0 12px 30px rgba(0,0,0,0.4); }

        /* 사이드바 호버 이질감 해결: none 상태일 때는 활성 스타일 제거 */
        body:not(.dark-mode) .nav-item[data-menu="none"] { background: transparent !important; color: inherit !important; border: none !important; }
    </style>
  </head>
  <body>
    <header th:replace="~{recruiterView/fragments/recruiterHeader :: headerFragment}"></header>

    <div class="dashboard-wrapper">
      <!-- 사이드바 -->
      <div th:replace="~{recruiterView/fragments/sidebar :: sidebarFragment}"></div>

      <div class="main-container">
        <main class="content-body">
            <div class="talent-list-wrapper">
                <!-- 헤더 섹션 -->
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h2 class="fw-bold mb-1" th:text="#{main.panel.scout_status}">인재 스카우트</h2>
                        <p class="text-muted mb-0" th:text="#{resume.notice.scout1}">조건에 맞는 인재를 찾아보세요.</p>
                    </div>
                    <div class="text-muted small">
                        Total: <span class="fw-bold text-primary" th:text="${talents?.size() ?: 0}">0</span>명
                    </div>
                </div>

                <!-- 리스트 영역 -->
                <div th:if="${talents == null or #lists.isEmpty(talents)}" class="text-center py-5">
                    <i class="fa-solid fa-users-slash fa-4x mb-3 text-light"></i>
                    <p class="text-muted" th:text="#{main.scout.empty}">활동 중인 인재가 없습니다.</p>
                </div>

                <div class="talent-card" th:each="t : ${talents}" 
                     th:onclick="|location.href='/Recruiter/TalentDetail?userId=${t.user.userId}'|">
                    <div class="talent-main">
                        <img class="talent-avatar" th:src="${t.user.profileImage?.fileUrl ?: '/images/common/default_profile.png'}" alt="avatar">
                        <div class="talent-info">
                            <div class="talent-name-row">
                                <span class="name-text" th:text="${#strings.length(t.user.nameKanjiMei ?: t.user.nickname) > 1 ? #strings.substring(t.user.nameKanjiMei ?: t.user.nickname, 0, 1) + '*' + #strings.substring(t.user.nameKanjiMei ?: t.user.nickname, #strings.length(t.user.nameKanjiMei ?: t.user.nickname)-1) : t.user.nameKanjiMei ?: t.user.nickname}">이름</span>
                                <span class="career-badge" th:classappend="${t.careerType == 'EXPERIENCED' ? 'badge-exp' : 'badge-new'}" 
                                      th:text="${t.careerType == 'EXPERIENCED' ? #messages.msg('resume.btn.experienced') : #messages.msg('resume.btn.newcomer')}">경력</span>
                            </div>
                            <div class="pr-text" th:text="${t.selfPr ?: '등록된 자기소개가 없습니다.'}">자기소개 한 줄...</div>
                        </div>
                    </div>
                    <div class="talent-action">
                        <button class="btn-view" th:text="#{main.btn.view_detail}">상세보기</button>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- 🌟 푸터를 main-container 내부 하단으로 이동하여 고정 -->
        <footer th:replace="~{NonLoginFragments/NonLoginFooter :: footerFragment}"></footer>
      </div>
    </div>

    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <script th:src="@{/js/recruiter/main.js}"></script>
    <script th:src="@{/js/recruiter/recruiterHeader.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
