<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <title>KUMO RECRUITER - 지원자 관리</title>

    <script th:src="@{/js/recruiter/main.js}"></script>
    <script th:src="@{/js/recruiter/recruiterHeader.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/recruiter/recruiterHeader.css}" />
    <link rel="stylesheet" th:href="@{/css/NonLoginFragments/NonLoginFooter.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/rightSidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/main.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/dark-theme.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/applicantInfo.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/calendar.css}" />
    <script th:src="@{/js/recruiter/rightSidebar.js}"></script>

    <style>
        .accordion-button.no-applicants::after { display: none !important; }
        .accordion-button.no-applicants { cursor: default !important; background-color: #fafafa; }

        .processed-row td {
            background-color: #f8f9fa !important;
            color: #adb5bd !important;
        }
        .processed-row .user-profile { opacity: 0.6; }
        .processed-row .text-dark { color: #adb5bd !important; }
    </style>
</head>
<body>
<header th:replace="~{recruiterView/fragments/recruiterHeader :: headerFragment}"></header>

<input type="hidden" id="loginUserEmail" th:value="${#authentication.principal.email}">

<div class="dashboard-wrapper">
    <div th:replace="~{recruiterView/fragments/sidebar :: sidebarFragment}"></div>

    <div class="main-container">
        <main class="content-body">
            <div class="applicant-card">

                <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                    <div class="header-title-area d-flex align-items-center">
                        <h2 class="table-title mb-0 fw-bold" th:text="#{app.info.title}">내 공고 및 지원자 관리</h2>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-muted fw-semibold">총 진행 중인 공고:
                            <span class="text-primary" th:text="${groupedList != null ? groupedList.size() : 0} + '건'">0건</span>
                        </span>
                    </div>
                </div>

                <div class="accordion job-accordion" id="jobListAccordion" th:if="${groupedList != null and !groupedList.isEmpty()}">

                    <div class="accordion-item" th:each="jobGroup, stat : ${groupedList}">
                        <h2 class="accordion-header" th:id="'heading' + ${stat.index}">
                            <button class="accordion-button collapsed" type="button"
                                    th:classappend="${#lists.isEmpty(jobGroup.applicants)} ? 'no-applicants' : ''"
                                    th:attr="data-bs-toggle=${not #lists.isEmpty(jobGroup.applicants) ? 'collapse' : null},
                                             data-bs-target=${not #lists.isEmpty(jobGroup.applicants) ? '#collapse' + stat.index : null}"
                                    aria-expanded="false">
                                <div class="d-flex justify-content-between align-items-center w-100 pe-3">
                                    <div class="d-flex align-items-center gap-3">
                                        <span class="badge bg-primary" th:if="${jobGroup.status == 'RECRUITING'}">진행중</span>
                                        <span class="badge bg-secondary" th:if="${jobGroup.status != 'RECRUITING'}">마감</span>
                                        <span class="title-font" th:text="${jobGroup.jobTitle}">공고 제목</span>
                                    </div>
                                    <div class="text-muted font-sm">
                                        <i class="bi bi-people-fill me-1"></i> 지원자 <strong class="text-dark" th:text="${jobGroup.applicantCount}">0</strong>명
                                    </div>
                                </div>
                            </button>
                        </h2>

                        <div th:if="${not #lists.isEmpty(jobGroup.applicants)}" th:id="'collapse' + ${stat.index}" class="accordion-collapse collapse" th:aria-labelledby="'heading' + ${stat.index}">
                            <div class="accordion-body">
                                <div class="table-responsive mini-table">
                                    <table class="table table-hover mb-0">
                                        <thead>
                                        <tr>
                                            <th>
                                                <span th:text="#{app.info.table.name}">지원자 이름</span>
                                            </th>
                                            <th>연락처</th>
                                            <th>이메일</th>
                                            <th>지원 일자</th>
                                            <th>상태</th>
                                            <th class="text-center">이력서</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="app : ${jobGroup.applicants}"
                                            th:id="'app-row-' + ${app.appId}"
                                            th:classappend="${app.status.name() != 'APPLIED'} ? 'processed-row' : ''">

                                            <td>
                                                <div class="user-profile">
                                                    <span class="avatar-sm bg-peach me-2">😊</span>
                                                    <span class="fw-semibold user-name" th:text="${app.seekerName}">지원자 이름</span>
                                                </div>
                                            </td>
                                            <td th:text="${app.seekerContact != null ? app.seekerContact : '-'}">연락처</td>
                                            <td th:text="${app.seekerEmail != null ? app.seekerEmail : '-'}">이메일</td>
                                            <td class="text-muted" th:text="${app.appliedAt}">지원일</td>
                                            <td class="status-cell">
                                                <span class="badge bg-warning text-dark" th:if="${app.status.name() == 'APPLIED'}">검토중</span>
                                                <span class="badge bg-success" th:if="${app.status.name() == 'PASSED'}">합격</span>
                                                <span class="badge bg-secondary" th:if="${app.status.name() == 'FAILED'}">불합격</span>
                                            </td>
                                            <td class="text-center">
                                                <button class="btn btn-sm btn-outline-primary rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#resumeModal"
                                                        onclick="loadResumeData(this)"
                                                        th:data-app-id="${app.appId}"
                                                        th:data-seeker-id="${app.seekerId}"
                                                        th:data-job-id="${jobGroup.jobId}"
                                                        th:data-name="${app.seekerName}"
                                                        th:data-contact="${app.seekerContact}"
                                                        th:data-email="${app.seekerEmail}"
                                                        th:data-job="${jobGroup.jobTitle}">
                                                    열람
                                                </button>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${groupedList == null or groupedList.isEmpty()}" class="text-center py-5">
                    <h5 class="text-muted">등록된 공고가 없습니다.</h5>
                </div>

            </div>
            <footer th:replace="~{NonLoginFragments/NonLoginFooter :: footerFragment}"></footer>
        </main>
        <div th:replace="~{recruiterView/fragments/rightSidebar :: rightSidebarFragment}"></div>
    </div>
</div>

<div class="modal fade" id="resumeModal" tabindex="-1" aria-labelledby="resumeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <div>
                    <h4 class="modal-title fw-bold" id="resumeModalLabel"><span id="modalName">지원자 이름</span>의 이력서</h4>
                    <p class="mb-0 text-muted mt-1">지원 공고: <span id="modalJob" class="fw-semibold text-dark">공고명</span> | <span id="modalContact">연락처</span> · <span id="modalEmail">이메일</span></p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body resume-modal-body" id="dynamicResumeBody">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted">불러오는 중...</p>
                </div>
            </div>
            <div class="modal-footer justify-content-between bg-light">
                <button type="button" class="btn btn-outline-secondary px-4" id="btnReject" onclick="updateAppStatus('FAILED')"><i class="bi bi-x-circle me-1"></i> 불합격 처리</button>
                <div>
                    <button type="button" class="btn btn-primary px-4 me-2" onclick="actionChat()"><i class="bi bi-chat-dots me-1"></i> 1:1 채팅 제안</button>
                    <button type="button" class="btn btn-success px-4" id="btnApprove" onclick="updateAppStatus('PASSED')"><i class="bi bi-check-circle me-1"></i> 합격 처리</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentAppId = null;
    let currentSeekerId = null; // 채팅방 생성용 구직자 ID 변수 추가
    let currentJobId = null;    // 채팅방 생성용 공고 ID 변수 추가

    // 모달창 데이터 불러오기
    async function loadResumeData(btn) {
        currentAppId = btn.getAttribute('data-app-id');
        currentSeekerId = btn.getAttribute('data-seeker-id'); // 버튼에서 값 추출
        currentJobId = btn.getAttribute('data-job-id');       // 버튼에서 값 추출

        document.getElementById('modalName').innerText = btn.getAttribute('data-name');
        document.getElementById('modalContact').innerText = btn.getAttribute('data-contact') || '-';
        document.getElementById('modalEmail').innerText = btn.getAttribute('data-email') || '-';
        document.getElementById('modalJob').innerText = btn.getAttribute('data-job');

        const modalBody = document.getElementById('dynamicResumeBody');
        modalBody.innerHTML = `<div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted">이력서 데이터를 불러오는 중입니다...</p></div>`;

        try {
            // 이력서 조회 API 호출 시 currentSeekerId 사용
            const response = await fetch(`/Recruiter/api/resume/${currentSeekerId}`);
            if(!response.ok) throw new Error('데이터 로드 실패');
            const data = await response.json();
            setTimeout(() => { renderResume(data, modalBody); }, 300);
        } catch (error) {
            modalBody.innerHTML = `<div class="text-center text-danger py-5"><i class="bi bi-exclamation-triangle fs-1"></i><p class="mt-2">이력서를 불러오지 못했습니다.</p></div>`;
        }
    }

    // JSON 데이터를 HTML로 그리는 함수
    function renderResume(data, container) {
        let html = '';
        if (data.profile) {
            html += `<div class="resume-section"><h5><i class="bi bi-person-lines-fill me-2"></i>자기소개 (<span class="text-primary">${data.profile.careerType || '미입력'}</span>)</h5><p class="text-secondary mb-0" style="line-height: 1.6; white-space: pre-wrap;">${data.profile.selfPr || '작성된 내용이 없습니다.'}</p></div>`;
        }
        if (data.condition) {
            html += `<div class="resume-section"><h5><i class="bi bi-check2-square me-2"></i>희망 근무 조건</h5><div class="spec-item"><span class="label">희망 직무</span> ${data.condition.desiredJob || '미입력'}</div><div class="spec-item"><span class="label">희망 급여</span> ${data.condition.salaryType || ''} ${data.condition.desiredSalary || '미입력'}</div></div>`;
        }
        html += `<div class="resume-section"><h5><i class="bi bi-briefcase-fill me-2"></i>경력 사항</h5>`;
        if (data.careers && data.careers.length > 0) {
            data.careers.forEach(c => {
                html += `<div class="border-bottom pb-2 mb-2 last-no-border"><div class="fw-bold fs-6">${c.companyName} <span class="text-muted small fw-normal ms-2">(${c.department || '-'})</span></div><div class="text-muted small">${c.startDate || ''} ~ ${c.endDate || '재직중'}</div><div class="mt-1 text-secondary" style="font-size: 0.9rem; white-space: pre-wrap;">${c.description || ''}</div></div>`;
            });
        } else { html += `<p class="text-muted small">등록된 경력이 없습니다.</p>`; }
        html += `</div><div class="row">`;

        html += `<div class="col-md-6"><div class="resume-section h-100"><h5><i class="bi bi-mortarboard-fill me-2"></i>최종 학력</h5>`;
        if (data.education) {
            let e = data.education;
            let statusKr = e.status === 'GRADUATED' ? '졸업' : (e.status === 'ATTENDING' ? '재학' : (e.status === 'EXPECTED' ? '졸업예정' : '중퇴'));
            html += `<div class="spec-item mb-2"><span class="fw-bold d-block">${e.schoolName}</span> <span class="text-muted small">${e.major || ''} (${statusKr})</span></div>`;
        } else { html += `<p class="text-muted small">등록된 학력이 없습니다.</p>`; }
        html += `</div></div>`;

        html += `<div class="col-md-6"><div class="resume-section h-100"><h5><i class="bi bi-award-fill me-2"></i>자격 및 어학</h5>`;
        let certsExist = false;
        if (data.certificates && data.certificates.length > 0) {
            data.certificates.forEach(c => { html += `<div class="spec-item mb-2"><span class="fw-bold d-block">${c.certName}</span> <span class="text-muted small">${c.issuer || '-'} (${c.acquisitionYear || '-'}년)</span></div>`; });
            certsExist = true;
        }
        if (data.languages && data.languages.length > 0) {
            data.languages.forEach(l => { html += `<div class="spec-item mb-2"><span class="fw-bold d-block">${l.language}</span> <span class="text-muted small">Level: ${l.level || '-'}</span></div>`; });
            certsExist = true;
        }
        if (!certsExist) { html += `<p class="text-muted small">등록된 자격증이나 어학 정보가 없습니다.</p>`; }
        html += `</div></div></div>`;

        if (data.documents && data.documents.length > 0) {
            html += `<div class="resume-section mt-3"><h5><i class="bi bi-file-earmark-pdf-fill me-2"></i>첨부 파일</h5>`;
            data.documents.forEach(d => { html += `<a href="${d.fileUrl}" class="btn btn-sm btn-light border text-primary me-2 mb-2" target="_blank"><i class="bi bi-download me-1"></i> ${d.fileName}</a>`; });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    // 합격/불합격 처리 (비동기)
    async function updateAppStatus(status) {
        if(!currentAppId) return;

        const btnApprove = document.getElementById('btnApprove');
        const btnReject = document.getElementById('btnReject');
        btnApprove.disabled = true; btnReject.disabled = true;

        try {
            const res = await fetch(`/Recruiter/api/application/${currentAppId}/status?status=${status}`, {
                method: 'POST'
            });

            if(res.ok) {
                const modalEl = document.getElementById('resumeModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();

                const row = document.getElementById(`app-row-${currentAppId}`);
                const tbody = row.parentNode;

                const badgeContainer = row.querySelector('.status-cell');
                if(status === 'PASSED') {
                    badgeContainer.innerHTML = '<span class="badge bg-success">합격</span>';
                } else {
                    badgeContainer.innerHTML = '<span class="badge bg-secondary">불합격</span>';
                }
                row.classList.add('processed-row');
                tbody.appendChild(row);

            } else {
                alert("상태 업데이트에 실패했습니다.");
            }
        } catch(e) {
            console.error(e);
            alert("서버 통신 중 오류가 발생했습니다.");
        } finally {
            btnApprove.disabled = false; btnReject.disabled = false;
        }
    }

    // =========================================================================
    // 🌟 [핵심 3] 채팅방 생성 후 리다이렉트 처리
    // =========================================================================
    function actionChat() {
        // 🌟 수정: id 대신 이메일을 가져옵니다.
        const recruiterEmail = document.getElementById('loginUserEmail').value;

        if (!currentSeekerId || !currentJobId || !recruiterEmail) {
            Swal.fire({ icon: 'error', title: '오류', text: '정보가 부족합니다.' });
            return;
        }

        // 백엔드 API로 recruiterEmail을 보냅니다!
        window.location.href = `/chat/create?seekerId=${currentSeekerId}&recruiterEmail=${recruiterEmail}&jobPostId=${currentJobId}`;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.js"></script>
<script th:src="@{/js/recruiter/global-calendar.js}"></script>
</body>
</html>
