<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KUMO - 지원 내역 확인</title>
    <!-- 🌟 외부 CSS 및 공통 스타일 연결 -->
    <link rel="stylesheet" th:href="@{/css/SeekerView/history.css}">
    <link rel="stylesheet" th:href="@{/css/SeekerView/myPage.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div th:replace="~{AuthenticatedFragments/AuthenticatedHeader :: headerFragment}"></div>

<div class="mypage-container">
    <aside th:replace="~{SeekerView/SeekerSidebar :: sidebarFragment('history')}"></aside>
    
    <main class="content-area">
        <div class="content-header">
            <h2 th:text="#{sidebar.history}">지원 내역 확인</h2>
        </div>
        
        <div class="history-container">
            <!-- 지원 내역이 없을 때 -->
            <div th:if="${history == null or #lists.isEmpty(history)}" class="text-center py-5">
                <i class="fa-solid fa-clipboard-list fa-3x mb-3" style="color: #eee;"></i>
                <p class="text-muted">지원한 내역이 없습니다.</p>
            </div>
            
            <!-- 지원 내역 테이블 -->
            <div class="table-wrapper" th:if="${history != null and !#lists.isEmpty(history)}">
                <table class="job-table">
                    <thead>
                        <tr>
                            <th>제목</th>
                            <th>상호명</th>
                            <th>근무지</th>
                            <th>급여</th>
                            <th>연락처</th>
                            <th>담당자</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="h : ${history}">
                            <td style="min-width: 200px;">
                                <a class="job-title-link" 
                                   th:href="@{/map/jobs/detail(id=${h.targetPostId}, source=${h.targetSource})}"
                                   th:text="${h.title}">공고 제목</a>
                                <span class="status-badge" th:classappend="'status-' + ${h.status.toLowerCase()}" th:text="${h.status}">상태</span>
                            </td>
                            <td th:text="${h.businessName}">상호명</td>
                            <td th:text="${h.location}">근무지</td>
                            <td th:text="${h.wage}">급여</td>
                            <td th:text="${h.contact}">연락처</td>
                            <td th:text="${h.manager}">담당자</td>
                            <td>
                                <!-- 🌟 data-id 속성에 ID 저장 (JS에서 사용) -->
                                <button type="button" class="btn-cancel-app" th:data-id="${h.appId}">지원취소</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{NonLoginFragments/NonLoginFooter :: footerFragment}"></div>

<!-- 🌟 외부 JS 연결 (jQuery 의존성 없음) -->
<script th:src="@{/js/SeekerView/history.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
