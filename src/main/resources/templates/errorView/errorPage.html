<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>KUMO - 에러 발생</title>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
	<style>
		body {
			margin: 0; font-family: 'Noto Sans KR', sans-serif;
			background-color: #f4f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh;
		}
		.error-card {
			background: white; padding: 50px 40px; border-radius: 16px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center;
			max-width: 600px; width: 90%; border-top: 6px solid #4a90e2;
		}
		.error-code { font-size: 80px; font-weight: 900; color: #4a90e2; margin: 0; line-height: 1; }
		.error-title { font-size: 22px; font-weight: 700; color: #333; margin: 20px 0 10px; }
		.error-desc { font-size: 15px; color: #777; line-height: 1.6; margin-bottom: 30px; word-break: keep-all; }
		
		/* 🌟 [추가] 개발자용 로그 박스 스타일 */
		.dev-trace-box {
			text-align: left; margin-bottom: 30px; background-color: #2b2b2b;
			border-radius: 8px; overflow: hidden;
		}
		.dev-trace-box summary {
			background-color: #3e3e3e; color: #fff; padding: 12px 15px;
			font-size: 14px; font-weight: bold; cursor: pointer; outline: none;
			user-select: none;
		}
		.dev-trace-box summary:hover { background-color: #4a4a4a; }
		.dev-trace-box pre {
			margin: 0; padding: 15px; color: #a9dc76; font-family: 'Courier New', Courier, monospace;
			font-size: 12px; white-space: pre-wrap; word-wrap: break-word;
			max-height: 300px; overflow-y: auto;
		}
		
		.btn-box { display: flex; gap: 10px; justify-content: center; }
		.btn { padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: bold; text-decoration: none; transition: 0.2s; cursor: pointer; border: none; }
		.btn-prev { background: #e5e5e5; color: #555; }
		.btn-prev:hover { background: #d5d5d5; }
		.btn-home { background: #4a90e2; color: white; }
		.btn-home:hover { background: #357abd; }
	</style>
</head>
<body>

<div class="error-card">
	<h1 class="error-code" th:text="${errorCode}">500</h1>
	<h2 class="error-title">문제가 발생했습니다.</h2>
	<p class="error-desc" th:text="${errorMessage}">페이지를 처리하는 중 오류가 발생했습니다.</p>
	
	<details class="dev-trace-box" th:if="${errorTrace != null and !errorTrace.isEmpty()}">
		<summary>🛠️ 개발자용 에러 로그 보기 (클릭하여 펼치기)</summary>
		<pre th:text="${errorTrace}"></pre>
	</details>
	
	<div class="btn-box">
		<button class="btn btn-prev" onclick="history.back()">이전 페이지</button>
		<a th:href="@{/}" class="btn btn-home">메인으로 가기</a>
	</div>
</div>

</body>
</html>
